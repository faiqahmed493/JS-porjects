<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background changer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


    <h1>Hello! Coders</h1>
    <div class="box">
        <div id="gray" class="boxes" onclick="changer('gray')" style="background-color: gray;"></div>
        <div id="cyan" class="boxes" onclick="changer('cyan')" style="background-color: cyan;"></div>
        <div id="black" class="boxes" onclick="changer('black')" style="background-color: black;"></div>
        <div id="yellow" class="boxes" onclick="changer('yellow')" style="background-color: yellow;"></div>
    </div>
    <p>Click on box to change background color!</p>

    <script src="app.js"></script>
</body>
</html>
