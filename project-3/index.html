<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="gamebox">
        <div class="box">
            <div class="reset">
                <button type="reset" id="restart">Restart</button>
                <span class="sp1">Attemptts: 7</span>
                <span class="sp1">Remaining:<span id="rem-attempts" class="sp1">7</span></span>
            </div>
            <div>
                <form>
                    <label for="guessinput" style="font-family: Arial, Helvetica, sans-serif;">Guess the Number:</label>
                    <input type="text" name="guessinput" id="guessinput" style="padding: 2px;" >
                    <button type="submit" style="background-color: darkorange; padding: 2px;" id="sub-btn">submit</button>
                    <div class="prev-input">
                        <p>Previous Guesses : <span id="prev-data">0</span></p>
                    </div>
                    <div class="low-high">
                        <p id="result"></p>
                    </div>
                </form>

                
            </div>
        </div>
        
    </div>
    
    <script src="app.js"></script>
</body>
</html>
